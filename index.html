<!DOCTYPE html>
<html>
<head>
  <title>NoNoSquare</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to bottom, #87ceeb, #ffffff);
    }

    h2 {
      color: #333;
    }

    #gameArea {
      width: 400px;
      height: 300px;
      margin: 20px auto;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: url('https://i.imgur.com/8Qf6QYb.png');
      background-size: cover;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .player, .npc {
      width: 50px;
      height: 50px;
      position: absolute;
      font-size: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .player {
      bottom: 10px;
      left: 170px;
    }

    .npc {
      top: 10px;
      left: 170px;
    }

    #alertBox {
      margin-top: 10px;
      padding: 10px;
      font-weight: bold;
      border-radius: 5px;
    }

    .safe {
      background: lightgreen;
    }

    .danger {
      background: red;
      color: white;
      animation: blink 0.5s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #333;
      color: white;
    }

    button:hover {
      background: #555;
    }
  </style>
</head>

<body>

<h2>🎮 NoNoSquare</h2>

<div id="gameArea">
  <div class="player" id="player">🧑</div>
  <div class="npc" id="npc">😈</div>
</div>

<div id="alertBox" class="safe">Aman...</div>

<div>
  <button onclick="action('run')">🏃 Kabur</button>
  <button onclick="action('fight')">✊ Lawan</button>
  <button onclick="action('wait')">😶 Diam</button>
</div>

<p id="result"></p>

<script>
let npc = document.getElementById("npc");
let alertBox = document.getElementById("alertBox");
let result = document.getElementById("result");

let npcY = 10;
let gameOver = false;

function moveNPC() {
  if (gameOver) return;

  npcY += 4;
  npc.style.top = npcY + "px";

  if (npcY > 120) {
    alertBox.className = "danger";
    alertBox.innerText = "⚠️ Bahaya! Orang mencurigakan mendekat!";
  }

  if (npcY > 230) {
    result.innerText = "💀 Kamu tertangkap! Game Over!";
    gameOver = true;
  }

  setTimeout(moveNPC, 500);
}

function action(type) {
  if (gameOver) return;

  let chance = Math.random();

  if (alertBox.classList.contains("danger")) {
    if (type === "run" && chance > 0.3) {
      result.innerText = "✅ Berhasil kabur!";
      gameOver = true;
    } else if (type === "fight" && chance > 0.5) {
      result.innerText = "💥 Kamu berhasil melawan!";
      gameOver = true;
    } else {
      result.innerText = "❌ Gagal! Kamu tertangkap!";
      gameOver = true;
    }
  } else {
    result.innerText = "🙂 Masih aman, tetap waspada!";
  }
}

moveNPC();
</script>

</body>
</html>
