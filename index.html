<!DOCTYPE html>
<html>
<head>
  <title>NoNoSquare</title>
  <style>
    body {
      text-align: center;
      background: #222;
      color: white;
      font-family: Arial;
    }

    #menu {
      margin-top: 50px;
    }

    #gameArea {
      display: none;
      width: 400px;
      height: 300px;
      margin: 20px auto;
      position: relative;

      background-image: 
        linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
        url("background_1.jpg");
      background-size: cover;
      background-position: center;

      border: 4px solid #333;
    }

    .sprite {
      width: 64px;
      height: 64px;
      position: absolute;
      image-rendering: pixelated;
    }

    #player {
      bottom: 10px;
      left: 20px;
    }

    #npc {
      bottom: 10px;
      left: 300px;
    }

    #firstPerson {
      display: none;
      width: 400px;
      height: 300px;
      margin: auto;
      background: black;
      border: 4px solid #333;
      position: relative;
    }

    #warning {
      color: red;
      font-weight: bold;
      animation: blink 0.3s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.4; }
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>🎮 NoNoSquare</h2>

<!-- MENU -->
<div id="menu">
  <h3>Pilih Karakter</h3>
  <button onclick="chooseCharacter('cowok')">👦 Cowok</button>
  <button onclick="chooseCharacter('cewek')">👧 Cewek</button>
</div>

<!-- GAME -->
<div id="gameArea">
  <img id="player" class="sprite" src="">
  <img id="npc" class="sprite" src="">
</div>

<!-- FIRST PERSON -->
<div id="firstPerson">
  <div id="warning">⚠️ Ada seseorang yang ingin memegangmu!</div>
  <img id="npcClose" src="">
</div>

<div id="actions" style="display:none;"></div>

<p id="result"></p>

<script>
let npc = document.getElementById("npc");
let player = document.getElementById("player");
let npcClose = document.getElementById("npcClose");

let gameArea = document.getElementById("gameArea");
let firstPerson = document.getElementById("firstPerson");
let actions = document.getElementById("actions");
let result = document.getElementById("result");

let npcX = 300;
let gameOver = false;
let switched = false;
let stage = 1;

// PILIH KARAKTER
function chooseCharacter(gender) {
  if (gender === "cowok") {
    player.src = "cowok.png";
    npc.src = "cewek_npc.png";
    npcClose.src = "cewek_npc.png";
  } else {
    player.src = "cewek.png";
    npc.src = "cowok_npc.png";
    npcClose.src = "cowok_npc.png";
  }

  document.getElementById("menu").style.display = "none";
  gameArea.style.display = "block";

  npcX = 300;
  npc.style.left = npcX + "px";

  moveNPC();
}

// NPC CHASE (lebih cepat)
function moveNPC() {
  if (gameOver) return;

  npcX -= 12;
  npc.style.left = npcX + "px";

  let distance = npcX - 20;

  if (distance <= 40 && !switched) {
    switchPOV();
  }

  setTimeout(moveNPC, 200);
}

// SWITCH POV
function switchPOV() {
  switched = true;
  stage = 1;

  gameArea.style.display = "none";
  firstPerson.style.display = "block";
  actions.style.display = "block";

  renderButtons();
  result.innerText = "Apa yang akan kamu lakukan?";
}

// RENDER BUTTONS SESUAI STAGE
function renderButtons() {
  if (stage === 1) {
    actions.innerHTML = `
      <button onclick="action('push')">✋ Push</button>
      <button onclick="action('help1')">📞 Help</button>
    `;
  }

  if (stage === 2) {
    actions.innerHTML = `
      <button onclick="action('run')">🏃 Run</button>
      <button onclick="action('help2')">📞 Help</button>
    `;
  }
}

// LOGIC ACTION + ENDING
function action(type) {
  if (gameOver) return;

  let chance = Math.random();

  // HELP pertama → langsung gagal
  if (type === "help1") {
    result.innerText = "📵 Tidak ada sinyal, tidak ada orang di sekitar... kamu gagal.";
    gameOver = true;
    return;
  }

  // PUSH → lanjut stage 2
  if (type === "push") {
    stage = 2;
    result.innerText = "💥 Kamu berhasil mendorongnya! Dia masih mengejar...";
    renderButtons();
    return;
  }

  // RUN → 100% selamat
  if (type === "run") {
    result.innerText = "🏃 Kamu kabur dan SELAMAT!";
    gameOver = true;
    return;
  }

  // HELP kedua → 50% chance
  if (type === "help2") {
    if (chance > 0.5) {
      result.innerText = "🚓 Ada orang lewat! Kamu diselamatkan!";
    } else {
      result.innerText = "📵 Tidak ada yang merespon... kamu tertangkap.";
    }
    gameOver = true;
    return;
  }
}
</script>

</body>
</html>
