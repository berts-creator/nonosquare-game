<!DOCTYPE html>
<html>
<head>
  <title>NoNoSquare</title>
  <style>
    body {
      text-align: center;
      background: #222;
      color: white;
      font-family: Arial;
    }

    #menu {
      margin-top: 50px;
    }

    #gameArea {
      display: none;
      width: 400px;
      height: 300px;
      margin: 20px auto;
      position: relative;
      background: #777;
      border: 4px solid #333;
    }

    .sprite {
      width: 64px;
      height: 64px;
      position: absolute;
      image-rendering: pixelated;
    }

    #player {
      bottom: 10px;
      left: 170px;
    }

    #npc {
      top: 10px;
      left: 170px;
    }

    /* FIRST PERSON */
    #firstPerson {
      display: none;
      width: 400px;
      height: 300px;
      margin: auto;
      background: black;
      border: 4px solid #333;
      position: relative;
    }

    #npcClose {
      width: 150px;
      margin-top: 60px;
      image-rendering: pixelated;
    }

    #warning {
      color: red;
      font-weight: bold;
      animation: blink 0.5s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.5; }
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>🎮 NoNoSquare</h2>

<!-- MENU -->
<div id="menu">
  <h3>Pilih Karakter</h3>
  <button onclick="chooseCharacter('cowok')">👦 Cowok</button>
  <button onclick="chooseCharacter('cewek')">👧 Cewek</button>
</div>

<!-- TOP VIEW -->
<div id="gameArea">
  <img id="player" class="sprite" src="">
  <img id="npc" class="sprite" src="">
</div>

<!-- FIRST PERSON -->
<div id="firstPerson">
  <div id="warning">⚠️ Terlalu dekat!</div>
  <img id="npcClose" src="">
</div>

<div id="actions" style="display:none;">
  <button onclick="action('run')">🏃 Kabur</button>
  <button onclick="action('push')">✋ Dorong</button>
  <button onclick="action('help')">📞 Bantuan</button>
</div>

<p id="result"></p>

<script>
let npc = document.getElementById("npc");
let npcClose = document.getElementById("npcClose");
let gameArea = document.getElementById("gameArea");
let firstPerson = document.getElementById("firstPerson");
let actions = document.getElementById("actions");
let result = document.getElementById("result");

let npcY = 10;
let gameOver = false;
let switched = false;

// PILIH KARAKTER
function chooseCharacter(gender) {
  let player = document.getElementById("player");

  if (gender === "cowok") {
    player.src = "cowok.png";
    npc.src = "cewek_npc.png";
    npcClose.src = "cewek_npc.png";
  } else {
    player.src = "cewek.png";
    npc.src = "cowok_npc.png";
    npcClose.src = "cowok_npc.png";
  }

  document.getElementById("menu").style.display = "none";
  gameArea.style.display = "block";

  moveNPC();
}

// NPC bergerak
function moveNPC() {
  if (gameOver) return;

  npcY += 4;
  npc.style.top = npcY + "px";

  if (npcY > 150 && !switched) {
    switchPOV();
  }

  setTimeout(moveNPC, 400);
}

// pindah POV
function switchPOV() {
  switched = true;
  gameArea.style.display = "none";
  firstPerson.style.display = "block";
  actions.style.display = "block";
}

// aksi player
function action(type) {
  if (gameOver) return;

  let chance = Math.random();

  if (type === "run" && chance > 0.3) {
    result.innerText = "✅ Kamu berhasil kabur!";
  } else if (type === "push" && chance > 0.5) {
    result.innerText = "💥 Kamu berhasil menjauhkan!";
  } else if (type === "help" && chance > 0.4) {
    result.innerText = "🚓 Bantuan datang!";
  } else {
    result.innerText = "❌ Kamu gagal!";
  }

  gameOver = true;
}
</script>

</body>
</html>
