<!DOCTYPE html>
<html>
<head>
  <title>NoNoSquare</title>

  <style>
    body {
      text-align: center;
      color: white;
      font-family: Arial;

      /* 🌍 BACKGROUND GLOBAL (FIXED & CLEAR) */
      background-image: url("background_1.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* 🌫 OVERLAY BIAR CINEMATIC TAPI TETAP JELAS */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.35);
      pointer-events: none;
    }

    #menu, #genderMenu, #prolog {
      margin-top: 80px;
    }

    #genderMenu, #prolog {
      display: none;
      width: 400px;
      margin: 50px auto;
    }

    #prolog {
      text-align: left;
      line-height: 1.5;
    }

    #gameArea {
      display: none;
      width: 400px;
      height: 300px;
      margin: 20px auto;
      position: relative;

      /* 🔥 FIX: jangan ganggu background */
      background: transparent;
      border: 3px solid rgba(255,255,255,0.2);
    }

    .sprite {
      width: 64px;
      height: 64px;
      position: absolute;
      image-rendering: pixelated;
    }

    #player { bottom: 10px; left: 20px; }
    #npc { bottom: 10px; left: 300px; }

    #firstPerson {
      display: none;
      width: 400px;
      height: 300px;
      margin: 20px auto;
      background: black;
      border: 4px solid #333;

      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #warning {
      color: red;
      font-weight: bold;
      animation: blink 0.3s infinite;
      margin-bottom: 10px;
    }

    @keyframes blink {
      50% { opacity: 0.4; }
    }

    #npcClose {
      width: 150px;
      height: 150px;
      object-fit: contain;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }

    #actions button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h2>🎮 NoNoSquare</h2>

<!-- ▶ PLAY MENU -->
<div id="menu">
  <button onclick="goToGender()">▶ Play</button>
</div>

<!-- 👦👧 GENDER MENU -->
<div id="genderMenu">
  <h3>Pilih Karakter</h3>
  <button onclick="chooseGender('cowok')">👦 Cowok</button>
  <button onclick="chooseGender('cewek')">👧 Cewek</button>
</div>

<!-- 📖 PROLOG -->
<div id="prolog">
  <p><b>Prolog:</b></p>
  <p>
    Kamu berjalan sendirian di jalan yang sepi.<br><br>
    Tidak ada orang di sekitar.<br>
    Hanya suara langkah kakimu sendiri.<br><br>
    Tapi kamu merasa seseorang mengikuti dari belakang...<br><br>
    Semakin kamu berjalan, langkah itu semakin dekat.
  </p>

  <button onclick="startGame()">Continue</button>
</div>

<!-- 🎮 GAME -->
<div id="gameArea">
  <img id="player" class="sprite" src="">
  <img id="npc" class="sprite" src="">
</div>

<!-- 👁 POV -->
<div id="firstPerson">
  <div id="warning">⚠️ Ada seseorang yang ingin memegangmu!</div>
  <img id="npcClose" src="">
</div>

<div id="actions" style="display:none;"></div>

<p id="result"></p>

<script>
let menu = document.getElementById("menu");
let genderMenu = document.getElementById("genderMenu");
let prolog = document.getElementById("prolog");
let gameArea = document.getElementById("gameArea");
let firstPerson = document.getElementById("firstPerson");
let actions = document.getElementById("actions");
let result = document.getElementById("result");

let player = document.getElementById("player");
let npc = document.getElementById("npc");
let npcClose = document.getElementById("npcClose");

let npcX = 300;
let gameOver = false;
let switched = false;
let stage = 1;
let selectedGender = "";

/* ▶ PLAY */
function goToGender() {
  menu.style.display = "none";
  genderMenu.style.display = "block";
}

/* 👤 GENDER */
function chooseGender(gender) {
  selectedGender = gender;

  genderMenu.style.display = "none";
  prolog.style.display = "block";
}

/* 🎬 START GAME */
function startGame() {
  prolog.style.display = "none";
  gameArea.style.display = "block";

  if (selectedGender === "cowok") {
    player.src = "cowok.png";
    npc.src = "cewek_npc.png";
    npcClose.src = "cewek_npc.png";
  } else {
    player.src = "cewek.png";
    npc.src = "cowok_npc.png";
    npcClose.src = "cowok_npc.png";
  }

  npcX = 300;
  npc.style.left = npcX + "px";

  gameOver = false;
  switched = false;
  stage = 1;

  actions.style.display = "none";
  actions.innerHTML = "";
  result.innerText = "";
  firstPerson.style.display = "none";

  moveNPC();
}

/* 🏃 NPC CHASE */
function moveNPC() {
  if (gameOver) return;

  npcX -= 12;
  npc.style.left = npcX + "px";

  if (npcX <= 60 && !switched) {
    switchPOV();
  }

  setTimeout(moveNPC, 200);
}

/* 👁 SWITCH POV */
function switchPOV() {
  switched = true;

  gameArea.style.display = "none";
  firstPerson.style.display = "flex";
  actions.style.display = "block";

  renderButtons();
  result.innerText = "Apa yang akan kamu lakukan?";
}

/* 🔘 BUTTONS */
function renderButtons() {
  if (stage === 1) {
    actions.innerHTML = `
      <button onclick="action('push')">✋ Push</button>
      <button onclick="action('help1')">📞 Help</button>
    `;
  }

  if (stage === 2) {
    actions.innerHTML = `
      <button onclick="action('run')">🏃 Run</button>
      <button onclick="action('help2')">📞 Help</button>
    `;
  }
}

/* 🎮 LOGIC */
function action(type) {
  if (gameOver) return;

  let chance = Math.random();

  if (type === "help1") {
    if (chance < 0.25) {
      result.innerText = "📡 Sinyal ditemukan! Ada orang di sekitar!";
      stage = 2;
      renderButtons();
    } else {
      result.innerText = "📵 Tidak ada sinyal... kamu gagal.";
      gameOver = true;
    }
    return;
  }

  if (type === "push") {
    stage = 2;
    result.innerText = "💥 Kamu mendorongnya! Dia masih mengejar...";
    renderButtons();
    return;
  }

  if (type === "run") {
    result.innerText = "🏃 Kamu berhasil kabur dan SELAMAT!";
    gameOver = true;
    return;
  }

  if (type === "help2") {
    if (chance > 0.5) {
      result.innerText = "🚓 Ada orang datang! Kamu diselamatkan!";
    } else {
      result.innerText = "📵 Tidak ada respon... kamu tertangkap.";
    }
    gameOver = true;
    return;
  }
}
</script>

</body>
</html>
