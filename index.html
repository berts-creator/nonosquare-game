<!DOCTYPE html>
<html>
<head>
  <title>NoNoSquare</title>
  <style>
    body {
      text-align: center;
      background: #222;
      color: white;
      font-family: Arial;
    }

    #menu {
      margin-top: 50px;
    }

    #gameArea {
      display: none;
      width: 400px;
      height: 300px;
      margin: 20px auto;
      position: relative;

      background-image: 
        linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
        url("background_1.jpg");
      background-size: cover;
      background-position: center;

      border: 4px solid #333;
    }

    .sprite {
      width: 64px;
      height: 64px;
      position: absolute;
      image-rendering: pixelated;
    }

    #player {
      bottom: 10px;
      left: 20px;
    }

    #npc {
      bottom: 10px;
      left: 300px;
    }

    #firstPerson {
      display: none;
      width: 400px;
      height: 300px;
      margin: auto;
      background: black;
      border: 4px solid #333;
      position: relative;
    }

    #npcClose {
      width: 150px;
      margin-top: 60px;
      image-rendering: pixelated;
    }

    #warning {
      color: red;
      font-weight: bold;
      animation: blink 0.3s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.4; }
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>🎮 NoNoSquare</h2>

<!-- MENU -->
<div id="menu">
  <h3>Pilih Karakter</h3>
  <button onclick="chooseCharacter('cowok')">👦 Cowok</button>
  <button onclick="chooseCharacter('cewek')">👧 Cewek</button>
</div>

<!-- GAME -->
<div id="gameArea">
  <img id="player" class="sprite" src="">
  <img id="npc" class="sprite" src="">
</div>

<!-- FIRST PERSON -->
<div id="firstPerson">
  <div id="warning">⚠️ Ada seseorang yang ingin memegangmu!</div>
  <img id="npcClose" src="">
</div>

<!-- ACTION -->
<div id="actions" style="display:none;">
  <button onclick="action('run')">🏃 Kabur</button>
  <button onclick="action('push')">✋ Dorong</button>
  <button onclick="action('help')">📞 Bantuan</button>
</div>

<p id="result"></p>

<script>
let npc = document.getElementById("npc");
let player = document.getElementById("player");
let npcClose = document.getElementById("npcClose");

let gameArea = document.getElementById("gameArea");
let firstPerson = document.getElementById("firstPerson");
let actions = document.getElementById("actions");
let result = document.getElementById("result");

let npcX = 300;
let gameOver = false;
let switched = false;

// PILIH KARAKTER
function chooseCharacter(gender) {
  if (gender === "cowok") {
    player.src = "cowok.png";
    npc.src = "cewek_npc.png";
    npcClose.src = "cewek_npc.png";
  } else {
    player.src = "cewek.png";
    npc.src = "cowok_npc.png";
    npcClose.src = "cowok_npc.png";
  }

  document.getElementById("menu").style.display = "none";
  gameArea.style.display = "block";

  npcX = 300;
  npc.style.left = npcX + "px";

  moveNPC();
}

// NPC LEBIH CEPAT
function moveNPC() {
  if (gameOver) return;

  npcX -= 12; // 🔥 DIPERCEPAT (sebelumnya 5)
  npc.style.left = npcX + "px";

  let distance = npcX - 20;

  if (distance <= 40 && !switched) {
    switchPOV();
  }

  setTimeout(moveNPC, 200); // 🔥 lebih cepat juga
}

// SWITCH POV
function switchPOV() {
  switched = true;

  gameArea.style.display = "none";
  firstPerson.style.display = "block";
  actions.style.display = "block";
}

// AKSI
function action(type) {
  if (gameOver) return;

  let chance = Math.random();

  if (type === "run" && chance > 0.3) {
    result.innerText = "✅ Kamu berhasil kabur!";
  } else if (type === "push" && chance > 0.5) {
    result.innerText = "💥 Kamu berhasil menjauhkan!";
  } else if (type === "help" && chance > 0.4) {
    result.innerText = "🚓 Bantuan datang!";
  } else {
    result.innerText = "❌ Kamu gagal!";
  }

  gameOver = true;
}
</script>

</body>
</html>
