<!DOCTYPE html>
<html>
<head>
  <title>NoNoSquare</title>

  <style>
    body {
      text-align: center;
      background: #222;
      color: white;
      font-family: Arial;
    }

    #menu {
      margin-top: 50px;
    }

    #gameArea {
      display: none;
      width: 400px;
      height: 300px;
      margin: 20px auto;
      position: relative;

      background-image: 
        linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
        url("background_1.jpg");
      background-size: cover;
      background-position: center;

      border: 4px solid #333;
    }

    .sprite {
      width: 64px;
      height: 64px;
      position: absolute;
      image-rendering: pixelated;
    }

    #player {
      bottom: 10px;
      left: 20px;
    }

    #npc {
      bottom: 10px;
      left: 300px;
    }

    #firstPerson {
      display: none;
      width: 400px;
      height: 300px;
      margin: 20px auto;
      background: black;
      border: 4px solid #333;

      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #warning {
      color: red;
      font-weight: bold;
      animation: blink 0.3s infinite;
      margin-bottom: 10px;
    }

    @keyframes blink {
      50% { opacity: 0.4; }
    }

    #npcClose {
      width: 150px;
      height: 150px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }

    #actions button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h2>🎮 NoNoSquare</h2>

<!-- MENU -->
<div id="menu">
  <h3>Pilih Karakter</h3>
  <button onclick="chooseCharacter('cowok')">👦 Cowok</button>
  <button onclick="chooseCharacter('cewek')">👧 Cewek</button>
</div>

<!-- GAME -->
<div id="gameArea">
  <img id="player" class="sprite" src="">
  <img id="npc" class="sprite" src="">
</div>

<!-- FIRST PERSON -->
<div id="firstPerson">
  <div id="warning">⚠️ Ada seseorang yang ingin memegangmu!</div>
  <img id="npcClose" src="">
</div>

<div id="actions" style="display:none;"></div>

<p id="result"></p>

<script>
let npc = document.getElementById("npc");
let player = document.getElementById("player");
let npcClose = document.getElementById("npcClose");

let gameArea = document.getElementById("gameArea");
let firstPerson = document.getElementById("firstPerson");
let actions = document.getElementById("actions");
let result = document.getElementById("result");

let npcX = 300;
let gameOver = false;
let switched = false;
let stage = 1;

// FORCE CLEAN START
firstPerson.style.display = "none";
actions.style.display = "none";

// PILIH KARAKTER
function chooseCharacter(gender) {
  if (gender === "cowok") {
    player.src = "cowok.png";
    npc.src = "cewek_npc.png";
    npcClose.src = "cewek_npc.png";
  } else {
    player.src = "cewek.png";
    npc.src = "cowok_npc.png";
    npcClose.src = "cowok_npc.png";
  }

  document.getElementById("menu").style.display = "none";
  gameArea.style.display = "block";

  npcX = 300;
  npc.style.left = npcX + "px";

  gameOver = false;
  switched = false;
  stage = 1;

  actions.style.display = "none";
  actions.innerHTML = "";
  result.innerText = "";
  firstPerson.style.display = "none";

  moveNPC();
}

// NPC CHASE
function moveNPC() {
  if (gameOver) return;

  npcX -= 12;
  npc.style.left = npcX + "px";

  let distance = npcX - 20;

  if (distance <= 40 && !switched) {
    switchPOV();
  }

  setTimeout(moveNPC, 200);
}

// SWITCH POV
function switchPOV() {
  switched = true;
  stage = 1;

  gameArea.style.display = "none";
  firstPerson.style.display = "flex";
  actions.style.display = "block";

  renderButtons();
  result.innerText = "Apa yang akan kamu lakukan?";
}

// BUTTONS
function renderButtons() {
  if (stage === 1) {
    actions.innerHTML = `
      <button onclick="action('push')">✋ Push</button>
      <button onclick="action('help1')">📞 Help</button>
    `;
  }

  if (stage === 2) {
    actions.innerHTML = `
      <button onclick="action('run')">🏃 Run</button>
      <button onclick="action('help2')">📞 Help</button>
    `;
  }
}

// GAME LOGIC
function action(type) {
  if (gameOver) return;

  let chance = Math.random();

  // HELP 1 (25% berhasil)
  if (type === "help1") {
    if (chance < 0.25) {
      result.innerText = "📡 Sinyal ditemukan! Ada orang di sekitar!";
      stage = 2;
      renderButtons();
    } else {
      result.innerText = "📵 Tidak ada sinyal... kamu gagal.";
      gameOver = true;
    }
    return;
  }

  // PUSH → lanjut stage 2
  if (type === "push") {
    stage = 2;
    result.innerText = "💥 Kamu mendorongnya! Dia masih mengejar...";
    renderButtons();
    return;
  }

  // RUN → 100% selamat
  if (type === "run") {
    result.innerText = "🏃 Kamu berhasil kabur dan SELAMAT!";
    gameOver = true;
    return;
  }

  // HELP 2 → 50%
  if (type === "help2") {
    if (chance > 0.5) {
      result.innerText = "🚓 Ada orang datang! Kamu diselamatkan!";
    } else {
      result.innerText = "📵 Tidak ada respon... kamu tertangkap.";
    }
    gameOver = true;
    return;
  }
}
</script>

</body>
</html>
